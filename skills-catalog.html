<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Airlock Skills Library — Full Visual Catalog</title>
<style>
  :root {
    --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a25; --surface3: #222233;
    --border: #2a2a3a; --border2: #3a3a4a;
    --text: #e4e4ef; --text2: #8888a0; --text3: #666680;
    --accent: #6366f1; --accent2: #818cf8;
    --green: #34d399; --orange: #f59e0b; --pink: #ec4899; --cyan: #22d3ee; --red: #ef4444;
    --purple: #a855f7; --lime: #84cc16;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
  
  .header { padding: 2rem 2rem 1rem; border-bottom: 1px solid var(--border); }
  .header h1 { font-size: 1.75rem; font-weight: 700; }
  .header h1 span { color: var(--accent2); }
  .header .sub { color: var(--text2); font-size: 0.9rem; margin-top: 0.25rem; }
  .stats { display: flex; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.5rem 1rem; }
  .stat .num { font-size: 1.25rem; font-weight: 700; color: var(--accent2); }
  .stat .label { font-size: 0.7rem; color: var(--text2); }
  
  .controls { padding: 0.75rem 2rem; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; position: sticky; top: 0; background: var(--bg); z-index: 10; border-bottom: 1px solid var(--border); }
  .search { flex: 1; min-width: 200px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.55rem 1rem; color: var(--text); font-size: 0.85rem; outline: none; }
  .search:focus { border-color: var(--accent); }
  .search::placeholder { color: var(--text3); }
  
  .pill-row { display: flex; gap: 0.25rem; flex-wrap: wrap; }
  .pill { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 0.3rem 0.7rem; color: var(--text2); font-size: 0.75rem; cursor: pointer; transition: all 0.15s; white-space: nowrap; user-select: none; }
  .pill:hover { border-color: var(--accent); color: var(--text); }
  .pill.active { background: var(--accent); border-color: var(--accent); color: white; }
  
  .view-modes { display: flex; gap: 2px; background: var(--surface); border-radius: 6px; border: 1px solid var(--border); overflow: hidden; }
  .vbtn { padding: 0.3rem 0.6rem; background: none; border: none; color: var(--text2); cursor: pointer; font-size: 0.8rem; }
  .vbtn.active { background: var(--accent); color: white; }
  
  .content { padding: 1.25rem 2rem 5rem; }
  
  /* Functional group view */
  .func-group { margin-bottom: 2rem; }
  .func-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
  .func-title { font-size: 1rem; font-weight: 700; text-transform: capitalize; }
  .func-badge { font-size: 0.65rem; background: var(--surface2); border: 1px solid var(--border); padding: 0.15rem 0.5rem; border-radius: 10px; color: var(--text2); }
  .func-badge.variants { background: rgba(168,85,247,0.15); border-color: rgba(168,85,247,0.3); color: var(--purple); }
  
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 0.75rem; }
  
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; cursor: pointer; transition: all 0.2s; position: relative; }
  .card:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(99,102,241,0.08); }
  .card.selected { border-color: var(--green); box-shadow: 0 0 0 1px var(--green); }
  .card.external { border-left: 3px solid var(--orange); }
  
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.35rem; gap: 0.5rem; }
  .card-title { font-size: 0.9rem; font-weight: 600; flex: 1; }
  .card-badges { display: flex; gap: 0.25rem; flex-shrink: 0; }
  .badge { font-size: 0.6rem; padding: 0.1rem 0.4rem; border-radius: 3px; white-space: nowrap; }
  .badge-repo { background: var(--surface2); color: var(--text2); }
  .badge-external { background: rgba(245,158,11,0.15); color: var(--orange); }
  .badge-variant { background: rgba(168,85,247,0.15); color: var(--purple); }
  .badge-tier { text-transform: uppercase; font-weight: 700; }
  .badge-tier.POWERFUL { background: rgba(239,68,68,0.15); color: var(--red); }
  
  .card-author { font-size: 0.7rem; color: var(--text3); margin-bottom: 0.35rem; }
  .card-desc { font-size: 0.78rem; color: var(--text2); line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .card-triggers { margin-top: 0.4rem; display: flex; flex-wrap: wrap; gap: 0.2rem; }
  .ttag { font-size: 0.6rem; background: rgba(99,102,241,0.1); color: var(--accent2); padding: 0.1rem 0.35rem; border-radius: 3px; }
  .card-check { position: absolute; top: 0.6rem; right: 0.6rem; width: 18px; height: 18px; border: 2px solid var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; }
  .card.selected .card-check { background: var(--green); border-color: var(--green); color: white; }
  
  /* List view */
  .list-item { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 0.6rem 0.8rem; display: flex; gap: 0.75rem; align-items: center; cursor: pointer; transition: all 0.12s; margin-bottom: 0.35rem; }
  .list-item:hover { border-color: var(--accent); }
  .list-item.selected { border-color: var(--green); }
  .list-item.external { border-left: 3px solid var(--orange); }
  .lcheck { width: 16px; height: 16px; border: 2px solid var(--border); border-radius: 3px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; }
  .list-item.selected .lcheck { background: var(--green); border-color: var(--green); color: white; }
  .linfo { flex: 1; min-width: 0; }
  .linfo h3 { font-size: 0.82rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .linfo p { font-size: 0.72rem; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lmeta { display: flex; gap: 0.35rem; flex-shrink: 0; }
  
  /* Modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 30; display: none; align-items: center; justify-content: center; }
  .modal-bg.vis { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; width: 90%; max-width: 560px; max-height: 80vh; overflow-y: auto; padding: 1.75rem; position: relative; }
  .modal h2 { font-size: 1.15rem; margin-bottom: 0.25rem; }
  .modal-meta { display: flex; gap: 0.4rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .modal-meta span { font-size: 0.72rem; background: var(--surface2); padding: 0.15rem 0.5rem; border-radius: 4px; color: var(--text2); }
  .msec { margin-bottom: 0.8rem; }
  .msec h3 { font-size: 0.82rem; color: var(--accent2); margin-bottom: 0.3rem; }
  .msec p { font-size: 0.82rem; color: var(--text2); line-height: 1.5; }
  .msec ul { list-style: none; }
  .msec li { font-size: 0.78rem; color: var(--text2); padding: 0.2rem 0 0.2rem 1rem; position: relative; }
  .msec li::before { content: "→"; position: absolute; left: 0; color: var(--accent2); }
  .mpath { font-size: 0.68rem; color: var(--text3); background: var(--bg); padding: 0.3rem 0.6rem; border-radius: 4px; font-family: monospace; word-break: break-all; }
  .murl { font-size: 0.72rem; color: var(--cyan); text-decoration: none; }
  .murl:hover { text-decoration: underline; }
  .mbtn { padding: 0.45rem 0.9rem; border-radius: 6px; border: none; cursor: pointer; font-size: 0.82rem; font-weight: 600; }
  .mbtn-p { background: var(--accent); color: white; }
  .mbtn-p:hover { background: var(--accent2); }
  .mbtn-s { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  
  /* Variant comparison */
  .variant-banner { background: rgba(168,85,247,0.08); border: 1px solid rgba(168,85,247,0.2); border-radius: 8px; padding: 0.6rem 0.8rem; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
  .variant-banner .icon { font-size: 1rem; }
  .variant-banner .txt { font-size: 0.78rem; color: var(--text2); }
  .variant-banner .txt strong { color: var(--purple); }
  
  /* Selection bar */
  .selbar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 0.65rem 2rem; display: flex; justify-content: space-between; align-items: center; transform: translateY(100%); transition: transform 0.2s; z-index: 20; }
  .selbar.vis { transform: translateY(0); }
  .selbar .ct { font-size: 0.85rem; }
  .selbar .ct span { color: var(--green); font-weight: 700; }
  .selbar .acts { display: flex; gap: 0.5rem; }
  
  .empty { text-align: center; padding: 3rem 2rem; color: var(--text2); }
  .empty h3 { color: var(--text); margin-bottom: 0.25rem; }
  
  /* Source legend */
  .legend { display: flex; gap: 1rem; margin-top: 0.75rem; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 0.35rem; font-size: 0.72rem; color: var(--text2); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }
  
  @media (max-width: 768px) {
    .controls { flex-direction: column; }
    .search { width: 100%; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Airlock <span>Skills Library</span></h1>
  <div class="sub">Full catalog across all collections — click to select, double-click for details</div>
  <div class="stats" id="stats"></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div> Local skill</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--orange)"></div> External (GitHub)</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div> Has variants (multiple implementations)</div>
  </div>
</div>

<div class="controls">
  <input type="text" class="search" id="search" placeholder="Search by name, description, trigger, author...">
  <div class="pill-row" id="sourceFilter"></div>
  <div class="pill-row" id="funcFilter"></div>
  <div class="view-modes">
    <button class="vbtn active" data-v="func" onclick="setView('func')">By Function</button>
    <button class="vbtn" data-v="grid" onclick="setView('grid')">Grid</button>
    <button class="vbtn" data-v="list" onclick="setView('list')">List</button>
  </div>
</div>

<div class="content" id="content"></div>

<div class="selbar" id="selbar">
  <div class="ct"><span id="selN">0</span> skills selected</div>
  <div class="acts">
    <button class="mbtn mbtn-s" onclick="clearSel()">Clear</button>
    <button class="mbtn mbtn-p" onclick="exportSel()">Export Selection</button>
  </div>
</div>

<div class="modal-bg" id="modal" onclick="if(event.target===this)closeMod()">
  <div class="modal" id="modC"></div>
</div>

| | `mcp.json` | Risky MCP servers, hardcoded env secrets, npx supply chain risks | | `hooks/` | Command injection via interpolation, data exfiltration, silent error suppression | | `a", "triggers": [], "tier": "", "source": "local", "functional_tag": "security", "variant_count": 10, "variant_group": "security"}, {"name": "ffuf-web-fuzzing", "title": "ffuf Web Fuzzing", "repo": "jthack/ffuf_claude_skill", "author": "jthack", "category": "security", "description": "Expert guidance for ffuf web fuzzing during penetration testing, including authenticated fuzzing with raw requests, auto-calibration, and result analysis", "url": "https://github.com/jthack/ffuf_claude_skill", "source": "external", "triggers": [], "tier": "", "path": "https://github.com/jthack/ffuf_claude_skill", "functional_tag": "security", "variant_count": 10, "variant_group": "security"}, {"name": "trail-of-bits-security", "title": "Trail of Bits Security Skills", "repo": "trailofbits/skills", "author": "Trail of Bits", "category": "security", "description": "Security skills for static analysis with CodeQL/Semgrep, variant analysis, code auditing, and vulnerability detection", "url": "https://github.com/trailofbits/skills", "source": "external", "triggers": [], "tier": "", "path": "https://github.com/trailofbits/skills", "functional_tag": "security", "variant_count": 10, "variant_group": "security"}, {"name": "webapp-testing", "title": "Webapp Testing (Official)", "repo": "anthropics/skills", "author": "Anthropic", "category": "development", "description": "Test local web applications using Playwright for UI verification and debugging", "url": "https://github.com/anthropics/skills/tree/main/skills/webapp-testing", "source": "external", "triggers": [], "tier": "", "path": "https://github.com/anthropics/skills/tree/main/skills/webapp-testing", "functional_tag": "testing", "variant_count": 10, "variant_group": "testing"}, {"name": "api-test-suite-builder", "title": "API Test Suite Builder", "repo": "claud category": "skills", "path": "everything-claude-code-main/skills/tdd-workflow", "description": "This skill ensures all code development follows TDD principles with comprehensive test coverage.", "triggers": [], "tier": "", "source": "local", "functional_tag": "testing", "variant_count": 10, "variant_group": "testing"}, {"name": "playwright-skill", "title": "Playwright Skill", "repo": "lackeyjb/playwright-skill", "author": "lackeyjb", "category": "testing", "description": "General-purpose browser automation using Playwright", "url": "https://github.com/lackeyjb/playwright-skill", "source": "external", "triggers": [], "tier": "", "path": "https://github.com/lackeyjb/playwright-skill", "functional_tag": "testing", "variant_count": 10, "variant_group": "testing"}, {"name": "test-driven-development", "title": "Test-Driven Development (TDD)", "repo": "superpowers", "author": "obra (Jesse Vincent)", "category": "skills", "path": "superpowers-main/skills/test-driven-development", "description": "Write the test first. Watch it fail. Write minimal code to pass. **Core principle:** If you didn't watch the test fail, you don't know if it tests the right thing. **Violating the letter of the rules is violating the spirit of the rules.**", "triggers": ["Always:**", "New features", "Bug fixes", "Refactoring", "Behavior changes"], "tier": "", "source": "local", "functional_tag": "testing", "variant_count": 10, "variant_group": "testing"}];
let st = { q: '', src: null, func: null, view: 'func', sel: new Set() };

const REPO_C = {
  'claude-skills':'#6366f1','everything-claude-code':'#22d3ee','superpowers':'#f59e0b',
  'ui-ux-pro-max-skill':'#ec4899','airlock-templates':'#34d399',
  'anthropics/skills':'#f97316','obra/superpowers-lab':'#eab308','obra/superpowers-skills':'#eab308',
};
const REPO_L = {
  'claude-skills':'Claude Skills','everything-claude-code':'Everything CC','superpowers':'Superpowers',
  'ui-ux-pro-max-skill':'UI/UX Pro Max','airlock-templates':'Airlock Templates',
  'anthropics/skills':'Anthropic Official',
};
const FUNC_L = {
  'planning':'Planning & Strategy','code-review':'Code Review','testing':'Testing & QA',
  'security':'Security','frontend':'Frontend / UI','backend':'Backend / API',
  'devops':'DevOps & Infra','architecture':'Architecture','data-ml':'Data & ML',
  'marketing':'Marketing','product':'Product','project-mgmt':'Project Management',
  'documents':'Documents','debugging':'Debugging & Verification','agent-workflow':'Agent & Workflow',
  'git-release':'Git & Release','design':'Design & Creative','compliance':'Compliance & Regulatory',
  'other':'Other'
};
const FUNC_ICONS = {
  'planning':'🎯','code-review':'🔍','testing':'🧪','security':'🔒','frontend':'🖥️',
  'backend':'⚙️','devops':'🚀','architecture':'🏗️','data-ml':'📊','marketing':'📣',
  'product':'📦','project-mgmt':'📋','documents':'📄','debugging':'🐛','agent-workflow':'🤖',
  'git-release':'🔀','design':'🎨','compliance':'📜','other':'📁'
};

function init(){
  renderStats();
  renderFilters();
  render();
  document.getElementById('search').addEventListener('input', e => { st.q = e.target.value.toLowerCase(); render(); });
}

function renderStats(){
  const local = SK.filter(s=>s.source==='local').length;
  const ext = SK.filter(s=>s.source==='external').length;
  const funcs = [...new Set(SK.map(s=>s.functional_tag))].length;
  const vg = [...new Set(SK.filter(s=>s.variant_count>1).map(s=>s.variant_group))].length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="num">${SK.length}</div><div class="label">Total Skills</div></div>
    <div class="stat"><div class="num">${local}</div><div class="label">Local</div></div>
    <div class="stat"><div class="num">${ext}</div><div class="label">External</div></div>
    <div class="stat"><div class="num">${funcs}</div><div class="label">Functions</div></div>
    <div class="stat"><div class="num">${vg}</div><div class="label">Variant Groups</div></div>
  `;
}

function renderFilters(){
  const srcs = ['local','external'];
  document.getElementById('sourceFilter').innerHTML =
    `<span class="pill ${!st.src?'active':''}" onclick="setSrc(null)">All Sources</span>` +
    srcs.map(s => `<span class="pill ${st.src===s?'active':''}" onclick="setSrc('${s}')">${s==='local'?'Local':'External'}</span>`).join('');
  
  const funcs = [...new Set(SK.map(s=>s.functional_tag))].sort((a,b)=>{
    if(a==='other') return 1; if(b==='other') return -1;
    return (FUNC_L[a]||a).localeCompare(FUNC_L[b]||b);
  });
  document.getElementById('funcFilter').innerHTML =
    `<span class="pill ${!st.func?'active':''}" onclick="setFunc(null)">All Functions</span>` +
    funcs.map(f => {
      const ct = SK.filter(s=>s.functional_tag===f).length;
      return `<span class="pill ${st.func===f?'active':''}" onclick="setFunc('${f}')">${FUNC_ICONS[f]||''} ${FUNC_L[f]||f} (${ct})</span>`;
    }).join('');
}

function getF(){
  return SK.filter(s => {
    if(st.src && s.source !== st.src) return false;
    if(st.func && s.functional_tag !== st.func) return false;
    if(st.q){
      const h = (s.title+' '+s.name+' '+s.description+' '+(s.triggers||[]).join(' ')+' '+s.author+' '+s.repo+' '+s.functional_tag).toLowerCase();
      return h.includes(st.q);
    }
    return true;
  });
}

function render(){
  const f = getF();
  const el = document.getElementById('content');
  if(!f.length){ el.innerHTML = '<div class="empty"><h3>No matches</h3><p>Adjust your filters or search</p></div>'; return; }
  
  if(st.view === 'func'){
    const groups = {};
    f.forEach(s => { const k = s.functional_tag; if(!groups[k]) groups[k]=[]; groups[k].push(s); });
    const order = Object.keys(groups).sort((a,b)=>{ if(a==='other') return 1; if(b==='other') return -1; return (FUNC_L[a]||a).localeCompare(FUNC_L[b]||b); });
    el.innerHTML = order.map(g => {
      const items = groups[g];
      const isVariant = items.length > 1 && g !== 'other';
      return `<div class="func-group">
        <div class="func-header">
          <span style="font-size:1.1rem">${FUNC_ICONS[g]||'📁'}</span>
          <span class="func-title">${FUNC_L[g]||g}</span>
          <span class="func-badge">${items.length} skill${items.length>1?'s':''}</span>
          ${isVariant ? '<span class="func-badge variants">'+items.length+' variants — compare!</span>' : ''}
        </div>
        ${isVariant ? '<div class="variant-banner"><span class="icon">⚔️</span><span class="txt"><strong>'+items.length+' implementations</strong> of the same function — run them head-to-head with subagents to find the best</span></div>' : ''}
        <div class="grid">${items.map(s=>card(s)).join('')}</div>
      </div>`;
    }).join('');
  } else if(st.view === 'grid'){
    el.innerHTML = `<div class="grid">${f.map(s=>card(s)).join('')}</div>`;
  } else {
    el.innerHTML = f.map(s=>listItem(s)).join('');
  }
  updBar();
}

function card(s){
  const sel = st.sel.has(s.path)?'selected':'';
  const ext = s.source==='external'?'external':'';
  const rc = REPO_C[s.repo]||'#6366f1';
  return `<div class="card ${sel} ${ext}" onclick="togSel('${esc(s.path)}')" ondblclick="event.stopPropagation();showDet('${esc(s.path)}')">
    <div class="card-check">${sel?'✓':''}</div>
    <div class="card-top">
      <div class="card-title">${esc(s.title)}</div>
      <div class="card-badges">
        ${s.source==='external'?'<span class="badge badge-external">external</span>':''}
        ${s.variant_count>1?'<span class="badge badge-variant">'+s.variant_count+' variants</span>':''}
        ${s.tier?'<span class="badge badge-tier '+s.tier+'">'+s.tier+'</span>':''}
      </div>
    </div>
    <div class="card-author">${esc(s.author)} · <span style="color:${rc}">${REPO_L[s.repo]||s.repo}</span></div>
    <div class="card-desc">${esc(s.description)||'<em style="opacity:0.4">No description</em>'}</div>
    ${(s.triggers||[]).length ? '<div class="card-triggers">'+s.triggers.slice(0,2).map(t=>'<span class="ttag">'+esc(t.substring(0,45))+'</span>').join('')+'</div>' : ''}
  </div>`;
}

function listItem(s){
  const sel = st.sel.has(s.path)?'selected':'';
  const ext = s.source==='external'?'external':'';
  return `<div class="list-item ${sel} ${ext}" onclick="togSel('${esc(s.path)}')" ondblclick="event.stopPropagation();showDet('${esc(s.path)}')">
    <div class="lcheck">${sel?'✓':''}</div>
    <div class="linfo"><h3>${esc(s.title)}</h3><p>${esc(s.description)||'No description'}</p></div>
    <div class="lmeta">
      ${s.variant_count>1?'<span class="badge badge-variant">'+s.variant_count+'v</span>':''}
      <span class="badge badge-repo">${esc(s.author)}</span>
    </div>
  </div>`;
}

function showDet(path){
  const s = SK.find(x=>x.path===path);
  if(!s) return;
  const rc = REPO_C[s.repo]||'#6366f1';
  
  // Find other variants
  let variantHtml = '';
  if(s.variant_group){
    const others = SK.filter(x=>x.variant_group===s.variant_group && x.path!==s.path);
    if(others.length){
      variantHtml = `<div class="msec"><h3>⚔️ Other implementations of "${FUNC_L[s.variant_group]||s.variant_group}"</h3><ul>
        ${others.map(o=>'<li><strong>'+esc(o.title)+'</strong> <span style="color:var(--text3)">by '+esc(o.author)+'</span></li>').join('')}
      </ul></div>`;
    }
  }
  
  document.getElementById('modC').innerHTML = `
    <h2>${esc(s.title)}</h2>
    <div class="modal-meta">
      <span style="color:${rc}">${REPO_L[s.repo]||s.repo}</span>
      <span>${esc(s.author)}</span>
      <span>${FUNC_L[s.functional_tag]||s.functional_tag}</span>
      ${s.source==='external'?'<span style="background:rgba(245,158,11,0.15);color:var(--orange)">External</span>':''}
      ${s.tier?'<span class="badge-tier '+s.tier+'">'+s.tier+'</span>':''}
    </div>
    <div class="msec"><h3>Description</h3><p>${esc(s.description)||'No description available'}</p></div>
    ${(s.triggers||[]).length?'<div class="msec"><h3>Triggers / Use When</h3><ul>'+s.triggers.map(t=>'<li>'+esc(t)+'</li>').join('')+'</ul></div>':''}
    ${variantHtml}
    <div class="msec"><h3>Source</h3>
      ${s.source==='external'&&s.url?'<a class="murl" href="'+esc(s.url)+'" target="_blank">'+esc(s.url)+'</a>':'<div class="mpath">'+esc(s.path)+'</div>'}
    </div>
    <div style="margin-top:1.25rem;display:flex;gap:0.5rem">
      <button class="mbtn ${st.sel.has(s.path)?'mbtn-s':'mbtn-p'}" onclick="togSel('${esc(s.path)}');showDet('${esc(s.path)}')">
        ${st.sel.has(s.path)?'✓ Selected':'Select This Skill'}
      </button>
    </div>
  `;
  document.getElementById('modal').classList.add('vis');
}

function closeMod(){ document.getElementById('modal').classList.remove('vis'); }

function togSel(p){ if(st.sel.has(p)) st.sel.delete(p); else st.sel.add(p); render(); }
function clearSel(){ st.sel.clear(); render(); }
function updBar(){ document.getElementById('selN').textContent=st.sel.size; document.getElementById('selbar').classList.toggle('vis',st.sel.size>0); }

function exportSel(){
  const sel = SK.filter(s=>st.sel.has(s.path));
  const lines = sel.map(s=>{
    const src = s.source==='external'?` [EXTERNAL: ${s.url||s.repo}]`:'';
    return `- ${s.title} (${s.functional_tag}) — ${s.author}${src}\n  Path: ${s.path}\n  Desc: ${s.description||'N/A'}`;
  });
  const blob = new Blob([lines.join('\n\n')], {type:'text/plain'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'selected-skills.txt'; a.click();
}

function setView(v){ st.view=v; document.querySelectorAll('.vbtn').forEach(b=>b.classList.toggle('active',b.dataset.v===v)); render(); }
function setSrc(s){ st.src=s; renderFilters(); render(); }
function setFunc(f){ st.func=f; renderFilters(); render(); }

function esc(s){ if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeMod(); });
init();
</script>
</body>
</html>
